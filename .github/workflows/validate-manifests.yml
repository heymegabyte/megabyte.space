name: Validate Manifests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate template utilities convention
        if: hashFiles('template/utils/*.ts') != ''
        run: node bin/validate-template-utils.mjs --ci
