name = "listmonk-megabyte-space"
main = "src/index.ts"
compatibility_date = "2026-04-24"
compatibility_flags = ["nodejs_compat_v2"]

[[containers]]
class_name = "ListmonkContainer"
image = "./Dockerfile"
max_instances = 1
instance_type = "basic"

[[durable_objects.bindings]]
name = "LISTMONK"
class_name = "ListmonkContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ListmonkContainer"]

[[routes]]
pattern = "listmonk.megabyte.space"
custom_domain = true

[assets]
directory = "./public"

[vars]
ENVIRONMENT = "production"
